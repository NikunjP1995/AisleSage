<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AisleSage | AI Wedding Planning</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --f: #1a2f23; /* Forest Green */
            --g: #c5a059; /* Gold */
            --w: #faf8f5; /* Off-white */
            --s: #4a5d51; /* Sage */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--w);
            color: var(--f);
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }
        h1, h2, h3 { font-family: 'Libre Baskerville', serif; color: var(--f); }
        .hidden { display: none !important; }
        #landing-page { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 1rem; color: var(--f); }
        .hero-subtitle { font-size: 1.2rem; max-width: 600px; margin-bottom: 2.5rem; color: var(--s); font-weight: 300; }
        .auth-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 20px 40px rgba(26,47,35,0.05); width: 100%; max-width: 400px; border-top: 3px solid var(--g); }
        input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 2px; font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--g); }
        button { width: 100%; padding: 14px; background: var(--f); color: var(--w); border: none; border-radius: 2px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
        button:hover { background: #243e2f; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .toggle-auth { margin-top: 20px; font-size: 0.9rem; cursor: pointer; color: var(--s); text-decoration: underline; }

        #app-view { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .sidebar { background: var(--f); color: var(--w); padding: 40px; display: flex; flex-direction: column; border-right: 1px solid rgba(197,160,89,0.2); }
        .sidebar h2 { color: var(--g); margin-bottom: 30px; font-size: 1.5rem; }
        .plan-item { margin-bottom: 20px; }
        .plan-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--g); margin-bottom: 5px; display: block; opacity: 0.8; }
        .plan-value { font-size: 1.1rem; font-family: 'Libre Baskerville', serif; }
        .logout-btn { margin-top: auto; background: transparent; border: 1px solid rgba(250,248,245,0.2); font-size: 0.8rem; padding: 10px; }
        .logout-btn:hover { background: rgba(250,248,245,0.1); border-color: var(--g); }

        .chat-container { display: flex; flex-direction: column; background: var(--w); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .message { max-width: 75%; padding: 18px 22px; border-radius: 4px; font-size: 1rem; position: relative; line-height: 1.6; }
        .message.sage { align-self: flex-start; background: white; border: 1px solid #eee; border-left: 4px solid var(--g); color: var(--f); }
        .message.user { align-self: flex-end; background: var(--f); color: var(--w); }
        .message-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; display: block; opacity: 0.6; }
        
        .input-area { padding: 30px 40px; background: white; border-top: 1px solid #eee; display: flex; gap: 15px; }
        #user-input { flex: 1; margin-bottom: 0; border: none; background: #f9f9f9; padding: 15px 20px; border-radius: 4px; }
        .send-btn { width: auto; padding: 0 30px; }

        @media (max-width: 900px) {
            #app-view { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <!-- Landing / Auth -->
    <div id="landing-page">
        <h1 class="hero-title">AisleSage</h1>
        <p class="hero-subtitle">Sophisticated AI intelligence for the modern wedding. Your personal wedding concierge, curated for elegance.</p>
        
        <div class="auth-card">
            <h2 id="auth-title" style="margin-bottom: 25px; font-size: 1.8rem;">Welcome</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="auth-btn">Begin Your Journey</button>
            <div class="toggle-auth" id="toggle-auth">New to AisleSage? Create an account</div>
        </div>
    </div>

    <!-- Main App View -->
    <div id="app-view" class="hidden">
        <aside class="sidebar">
            <h2>The Vision</h2>
            <div id="plan-details">
                <div class="plan-item">
                    <span class="plan-label">Wedding Date</span>
                    <div class="plan-value" id="disp-date">Spring 2026</div>
                </div>
                <div class="plan-item">
                    <span class="plan-label">Investment</span>
                    <div class="plan-value" id="disp-budget">$50,000</div>
                </div>
                <div class="plan-item">
                    <span class="plan-label">Aesthetic</span>
                    <div class="plan-value" id="disp-vision">Minimalist Premium</div>
                </div>
            </div>
            <button class="logout-btn" id="logout-btn">Sign Out</button>
        </aside>

        <main class="chat-container">
            <div id="chat-messages">
                <!-- Messages flow here -->
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask Sage anything about your wedding...">
                <button class="send-btn" id="send-btn">Ask</button>
            </div>
        </main>
    </div>

    <script>
        // Firebase Configuration (Compat Mode)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "aisle-sage-2d405.firebaseapp.com",
            projectId: "aisle-sage-2d405",
            storageBucket: "aisle-sage-2d405.appspot.com",
            messagingSenderId: "367307044007",
            appId: "1:367307044007:web:809b4ec8b9e67d268d8339"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const landingPage = document.getElementById('landing-page');
        const appView = document.getElementById('app-view');
        const authBtn = document.getElementById('auth-btn');
        const toggleAuth = document.getElementById('toggle-auth');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const authTitle = document.getElementById('auth-title');
        const logoutBtn = document.getElementById('logout-btn');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');

        let isLogin = true;

        // Toggle Auth Mode
        toggleAuth.onclick = () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Welcome" : "Create Account";
            authBtn.innerText = isLogin ? "Begin Your Journey" : "Join AisleSage";
            toggleAuth.innerText = isLogin ? "New to AisleSage? Create an account" : "Already have an account? Sign in";
        };

        // Auth Actions
        authBtn.onclick = () => {
            const email = emailInput.value;
            const password = passInput.value;
            if (!email || !password) return alert("Please enter details");

            if (isLogin) {
                auth.signInWithEmailAndPassword(email, password).catch(e => alert(e.message));
            } else {
                auth.createUserWithEmailAndPassword(email, password).then(cred => {
                    return db.collection('users').doc(cred.user.uid).set({
                        budget: "Not set",
                        date: "Not set",
                        vision: "Minimalist Premium"
                    });
                }).catch(e => alert(e.message));
            }
        };

        logoutBtn.onclick = () => auth.signOut();

        // Load Plan Details
        function loadUserPlan(uid) {
            db.collection('users').doc(uid).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('disp-budget').innerText = data.budget || "$50,000";
                    document.getElementById('disp-date').innerText = data.date || "Spring 2026";
                    document.getElementById('disp-vision').innerText = data.vision || "Minimalist Premium";
                }
            });
        }

        // --- NEW: Load Chat History ---
        function loadChatHistory(uid) {
            chatMessages.innerHTML = ''; // Clear for fresh load
            
            db.collection('messages')
                .where('uid', '==', uid)
                .orderBy('timestamp', 'asc') // CRITICAL: This requires a Firestore Index
                .get()
                .then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        updateChatLog('Sage', "Welcome back! I'm ready to continue our planning journey.");
                    } else {
                        querySnapshot.forEach((doc) => {
                            const data = doc.data();
                            const sender = data.role === 'user' ? 'You' : 'Sage';
                            updateChatLog(sender, data.text);
                        });
                    }
                    // Auto-scroll to bottom after loading history
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                })
                .catch((error) => {
                    console.error("Error loading chat history:", error);
                    // Helpful fallback for first-time use of the query
                    if (error.code === 'failed-precondition') {
                        updateChatLog('Sage', "Note: Index is currently building in Firebase. Please wait a few moments.");
                    }
                });
        }

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                landingPage.classList.add('hidden');
                appView.classList.remove('hidden');
                loadUserPlan(user.uid);
                loadChatHistory(user.uid); // TRIGGER LOAD HERE
            } else {
                landingPage.classList.remove('hidden');
                appView.classList.add('hidden');
            }
        });

        // Chat UI Update
        function updateChatLog(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'Sage' ? 'sage' : 'user'}`;
            msgDiv.innerHTML = `<span class="message-label">${sender}</span><div>${text}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send Message
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const user = auth.currentUser;
            if (!user) return;

            // 1. Show user message
            updateChatLog('You', text);
            userInput.value = '';

            // 2. Save User Message to Firebase
            db.collection('messages').add({
                uid: user.uid,
                role: 'user',
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 3. Call Claude (Using placeholder - PLEASE USE PROXY FOR PRODUCTION)
            try {
                // IMPORTANT: Replace this fetch with your Cloud Function URL for security
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'REPLACE_WITH_YOUR_KEY_OR_USE_PROXY', // SECURITY WARNING
                        'anthropic-version': '2023-06-01',
                        'dangerously-allow-browser': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-opus-20240229",
                        max_tokens: 1024,
                        messages: [{ role: "user", content: text }],
                        system: "You are Sage, a sophisticated wedding planning AI. You provide minimalist, premium advice."
                    })
                });

                const data = await response.json();
                const sageReply = data.content[0].text;

                // 4. Show Sage Reply
                updateChatLog('Sage', sageReply);

                // 5. Save Sage Reply to Firebase
                db.collection('messages').add({
                    uid: user.uid,
                    role: 'assistant',
                    text: sageReply,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

            } catch (e) {
                console.error(e);
                updateChatLog('Sage', "I'm sorry, my thoughts are a bit tangled at the moment. Please try again.");
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    </script>
</body>
</html>
